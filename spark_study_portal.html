<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Spark In Action â€” Engineering Study Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/scala.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/python.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/bash.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/yaml.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
:root {
  --bg-deep:    #080E1A;
  --bg-main:    #0D1426;
  --bg-card:    #111D35;
  --bg-sidebar: #091020;
  --bg-hover:   #1A2845;
  --bg-active:  #1E3460;
  --accent:     #3B82F6;
  --accent-2:   #60A5FA;
  --accent-glow:#3B82F620;
  --teal:       #14B8A6;
  --green:      #22C55E;
  --orange:     #F97316;
  --purple:     #A855F7;
  --red:        #EF4444;
  --yellow:     #EAB308;
  --text-1:     #F1F5F9;
  --text-2:     #94A3B8;
  --text-3:     #64748B;
  --border:     #1E2D4A;
  --border-2:   #2A3F5F;
  --radius:     12px;
  --radius-sm:  8px;
  --sidebar-w:  310px;
  --header-h:   58px;
}
*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
html, body { height:100%; font-family:'Inter',sans-serif; background:var(--bg-deep); color:var(--text-1); overflow:hidden; }

/* â”€â”€â”€ LOGIN â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */
#login-screen {
  position:fixed; inset:0; z-index:1000;
  display:flex; align-items:center; justify-content:center;
  background: radial-gradient(ellipse at 30% 40%, #0a1a4020 0%, transparent 60%),
              radial-gradient(ellipse at 70% 60%, #1a0a3020 0%, transparent 60%),
              linear-gradient(135deg, #080E1A 0%, #0D1426 50%, #080E1A 100%);
}
.login-bg-orb {
  position:absolute; border-radius:50%; filter:blur(80px); pointer-events:none;
}
.orb-1 { width:500px; height:500px; background:#3B82F615; top:-100px; left:-100px; }
.orb-2 { width:400px; height:400px; background:#A855F710; bottom:-100px; right:-100px; }
.orb-3 { width:300px; height:300px; background:#14B8A610; top:50%; left:50%; transform:translate(-50%,-50%); }
.login-card {
  position:relative; z-index:1;
  background: rgba(17,29,53,0.85);
  backdrop-filter: blur(24px);
  border: 1px solid var(--border-2);
  border-radius: 24px;
  padding: 48px 44px;
  width: 440px;
  box-shadow: 0 32px 80px #00000060, 0 0 0 1px #3B82F610;
}
.login-logo {
  display:flex; align-items:center; gap:12px; margin-bottom:32px;
}
.login-logo-icon {
  width:44px; height:44px; border-radius:12px;
  background: linear-gradient(135deg,#3B82F6,#A855F7);
  display:flex; align-items:center; justify-content:center; font-size:22px;
}
.login-logo h1 { font-size:1.4rem; font-weight:700; }
.login-logo span { font-size:.8rem; color:var(--text-2); display:block; }
.login-card h2 { font-size:1.6rem; font-weight:700; margin-bottom:6px; }
.login-card p  { color:var(--text-2); font-size:.9rem; margin-bottom:32px; }
.form-group { margin-bottom:20px; }
.form-group label { display:block; font-size:.82rem; font-weight:500; color:var(--text-2); margin-bottom:8px; letter-spacing:.02em; text-transform:uppercase; }
.form-group input {
  width:100%; padding:13px 16px;
  background:var(--bg-deep); border:1.5px solid var(--border-2);
  border-radius:var(--radius-sm); color:var(--text-1);
  font-family:'Inter',sans-serif; font-size:.95rem;
  transition:border-color .2s,box-shadow .2s;
  outline:none;
}
.form-group input:focus { border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-glow); }
.login-btn {
  width:100%; padding:14px;
  background: linear-gradient(135deg,#3B82F6,#6366F1);
  border:none; border-radius:var(--radius-sm);
  color:#fff; font-family:'Inter',sans-serif; font-size:1rem; font-weight:600;
  cursor:pointer; transition:all .2s; margin-top:8px;
  box-shadow: 0 4px 20px #3B82F640;
}
.login-btn:hover { transform:translateY(-1px); box-shadow:0 8px 30px #3B82F660; }
.login-btn:active { transform:translateY(0); }
.login-error { color:#EF4444; font-size:.85rem; margin-top:12px; display:none; text-align:center; }
.login-hint { text-align:center; margin-top:20px; color:var(--text-3); font-size:.8rem; }
.login-hint span { color:var(--accent-2); }

/* â”€â”€â”€ MAIN APP â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */
#app { display:none; height:100vh; flex-direction:column; }
#app.visible { display:flex; }

/* Header */
.app-header {
  height:var(--header-h); min-height:var(--header-h);
  background:var(--bg-sidebar);
  border-bottom:1px solid var(--border);
  display:flex; align-items:center; padding:0 20px; gap:16px;
  z-index:10;
}
.app-header .logo { display:flex; align-items:center; gap:10px; min-width:calc(var(--sidebar-w) - 20px); }
.app-header .logo-icon { width:32px; height:32px; border-radius:8px; background:linear-gradient(135deg,#3B82F6,#A855F7); display:flex; align-items:center; justify-content:center; font-size:16px; }
.app-header .logo-text { font-size:1rem; font-weight:700; }
.app-header .logo-sub  { font-size:.7rem; color:var(--text-3); }
.header-search {
  flex:1; display:flex; align-items:center; gap:8px;
  background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius-sm);
  padding:8px 14px; max-width:380px;
}
.header-search input { background:none; border:none; outline:none; color:var(--text-1); font-family:'Inter',sans-serif; font-size:.88rem; flex:1; }
.header-search svg { color:var(--text-3); flex-shrink:0; }
.header-right { margin-left:auto; display:flex; align-items:center; gap:12px; }
.header-badge { background:linear-gradient(135deg,#3B82F6,#6366F1); padding:5px 12px; border-radius:20px; font-size:.75rem; font-weight:600; }
.user-avatar { width:34px; height:34px; border-radius:50%; background:linear-gradient(135deg,#14B8A6,#3B82F6); display:flex; align-items:center; justify-content:center; font-weight:700; font-size:.85rem; cursor:pointer; }

/* Layout */
.app-body { display:flex; flex:1; overflow:hidden; }

/* Sidebar */
.sidebar {
  width:var(--sidebar-w); min-width:var(--sidebar-w);
  background:var(--bg-sidebar);
  border-right:1px solid var(--border);
  overflow-y:auto; overflow-x:hidden;
  display:flex; flex-direction:column;
}
.sidebar::-webkit-scrollbar { width:4px; }
.sidebar::-webkit-scrollbar-track { background:transparent; }
.sidebar::-webkit-scrollbar-thumb { background:var(--border-2); border-radius:4px; }

.sidebar-section { padding:16px 12px 6px; }
.sidebar-section-label { font-size:.68rem; font-weight:600; text-transform:uppercase; letter-spacing:.1em; color:var(--text-3); padding:0 8px; margin-bottom:6px; }

/* Tree Items */
.tree-part { margin-bottom:4px; }
.tree-part-header {
  display:flex; align-items:center; gap:8px;
  padding:9px 10px; border-radius:var(--radius-sm);
  cursor:pointer; transition:all .15s; user-select:none;
  font-size:.85rem; font-weight:600; color:var(--text-2);
}
.tree-part-header:hover { background:var(--bg-hover); color:var(--text-1); }
.tree-part-header.active-part { background:var(--accent-glow); color:var(--accent-2); }
.tree-part-icon { font-size:14px; flex-shrink:0; }
.tree-part-arrow { margin-left:auto; transition:transform .2s; font-size:11px; color:var(--text-3); }
.tree-part-arrow.open { transform:rotate(90deg); }
.tree-part-children { display:none; padding-left:8px; }
.tree-part-children.open { display:block; }

.tree-chapter { margin-bottom:2px; }
.tree-chapter-header {
  display:flex; align-items:center; gap:7px;
  padding:7px 10px; border-radius:var(--radius-sm);
  cursor:pointer; transition:all .15s; user-select:none;
  font-size:.8rem; font-weight:500; color:var(--text-3);
}
.tree-chapter-header:hover { background:var(--bg-hover); color:var(--text-2); }
.tree-chapter-header.active-ch { color:var(--teal); }
.tree-chapter-arrow { margin-left:auto; transition:transform .2s; font-size:10px; }
.tree-chapter-arrow.open { transform:rotate(90deg); }
.tree-chapter-children { display:none; padding-left:12px; }
.tree-chapter-children.open { display:block; }

.tree-topic {
  display:flex; align-items:center; gap:6px;
  padding:6px 10px; border-radius:var(--radius-sm);
  cursor:pointer; transition:all .15s; user-select:none;
  font-size:.78rem; color:var(--text-3); margin-bottom:1px;
}
.tree-topic:hover { background:var(--bg-hover); color:var(--text-2); }
.tree-topic.active { background:var(--bg-active); color:var(--accent-2); font-weight:500; }
.tree-topic::before { content:'â€¢'; color:var(--border-2); flex-shrink:0; }
.tree-topic.active::before { color:var(--accent); }

/* Content area */
.content-area {
  flex:1; overflow-y:auto; background:var(--bg-main);
  padding:0;
}
.content-area::-webkit-scrollbar { width:6px; }
.content-area::-webkit-scrollbar-track { background:transparent; }
.content-area::-webkit-scrollbar-thumb { background:var(--border-2); border-radius:4px; }

/* Content inner */
.content-inner { max-width:1100px; margin:0 auto; padding:32px 36px 80px; }

/* Welcome screen */
.welcome-screen { padding:40px; }
.welcome-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:16px; margin-top:32px; }
.stat-card {
  background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius);
  padding:20px; position:relative; overflow:hidden;
}
.stat-card::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; background:linear-gradient(90deg,var(--accent),var(--teal)); }
.stat-card .stat-num { font-size:2.4rem; font-weight:800; color:var(--accent-2); }
.stat-card .stat-label { font-size:.82rem; color:var(--text-2); margin-top:4px; }
.stat-card .stat-icon { font-size:2rem; position:absolute; right:16px; top:16px; opacity:.3; }

.quick-links { display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:12px; margin-top:20px; }
.quick-link {
  background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius);
  padding:16px; cursor:pointer; transition:all .2s;
  display:flex; align-items:center; gap:12px; font-size:.85rem; font-weight:500;
}
.quick-link:hover { border-color:var(--accent); background:var(--bg-hover); transform:translateY(-2px); }
.quick-link .ql-icon { font-size:1.4rem; }

/* Topic page */
.topic-header { margin-bottom:28px; }
.topic-breadcrumb { font-size:.75rem; color:var(--text-3); margin-bottom:12px; display:flex; align-items:center; gap:6px; flex-wrap:wrap; }
.topic-breadcrumb span { color:var(--text-3); }
.topic-breadcrumb .bc-sep { color:var(--border-2); }
.topic-breadcrumb .bc-current { color:var(--accent-2); }
.topic-title { font-size:1.9rem; font-weight:800; margin-bottom:10px; line-height:1.2; }
.topic-title .title-accent { background:linear-gradient(135deg,#3B82F6,#A855F7); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
.topic-tagline { color:var(--text-2); font-size:.95rem; line-height:1.6; margin-bottom:16px; }
.topic-tags { display:flex; gap:8px; flex-wrap:wrap; }
.tag {
  padding:4px 12px; border-radius:20px; font-size:.73rem; font-weight:600;
  letter-spacing:.03em;
}
.tag-critical { background:#EF444420; color:#EF4444; border:1px solid #EF444430; }
.tag-essential { background:#3B82F620; color:#3B82F6; border:1px solid #3B82F630; }
.tag-good     { background:#22C55E20; color:#22C55E; border:1px solid #22C55E30; }
.tag-part     { background:#A855F720; color:#A855F7; border:1px solid #A855F730; }

/* Sections */
.section { margin-bottom:32px; }
.section-title {
  font-size:1.05rem; font-weight:700; margin-bottom:14px;
  display:flex; align-items:center; gap:8px; color:var(--text-1);
}
.section-title .s-icon { font-size:1.1rem; }
.section-divider { height:1px; background:var(--border); margin-bottom:24px; }

/* Key concepts grid */
.concepts-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:12px; }
.concept-card {
  background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius);
  padding:16px; transition:all .2s;
}
.concept-card:hover { border-color:var(--accent); transform:translateY(-2px); }
.concept-card .cc-icon { font-size:1.6rem; margin-bottom:10px; }
.concept-card .cc-title { font-size:.85rem; font-weight:600; margin-bottom:6px; color:var(--text-1); }
.concept-card .cc-desc  { font-size:.78rem; color:var(--text-2); line-height:1.5; }

/* Info box */
.info-box {
  background:var(--bg-card); border-radius:var(--radius);
  padding:18px 20px; margin-bottom:16px; line-height:1.7;
  font-size:.88rem; color:var(--text-2); border-left:3px solid var(--accent);
}
.info-box strong { color:var(--text-1); }
.info-box.warn { border-left-color:var(--orange); }
.info-box.success { border-left-color:var(--green); }
.info-box.tip { border-left-color:var(--teal); }

/* Data table */
.data-table-wrap { overflow-x:auto; border-radius:var(--radius); border:1px solid var(--border); }
.data-table { width:100%; border-collapse:collapse; font-size:.82rem; }
.data-table th { background:var(--bg-deep); color:var(--accent-2); padding:11px 16px; text-align:left; font-weight:600; border-bottom:1px solid var(--border-2); white-space:nowrap; }
.data-table td { padding:10px 16px; color:var(--text-2); border-bottom:1px solid var(--border); vertical-align:top; }
.data-table tr:last-child td { border-bottom:none; }
.data-table tr:hover td { background:var(--bg-hover); }
.data-table .mono { font-family:'JetBrains Mono',monospace; color:var(--orange); font-size:.8rem; }

/* Code block */
.code-block {
  background:#0D1117; border:1px solid var(--border);
  border-radius:var(--radius); overflow:hidden; margin-bottom:20px;
}
.code-header {
  background:#161B22; border-bottom:1px solid var(--border);
  padding:10px 16px; display:flex; align-items:center; justify-content:space-between;
}
.code-lang { font-size:.72rem; font-weight:600; text-transform:uppercase; letter-spacing:.08em; }
.code-lang.scala  { color:#DC3958; }
.code-lang.python { color:#F8D25C; }
.code-lang.bash   { color:#98C379; }
.code-lang.yaml   { color:#56B6C2; }
.code-lang.java   { color:#E5A24B; }
.code-copy {
  background:var(--bg-hover); border:1px solid var(--border-2); border-radius:6px;
  padding:4px 10px; font-size:.72rem; color:var(--text-2);
  cursor:pointer; transition:all .15s; font-family:'Inter',sans-serif;
}
.code-copy:hover { background:var(--accent); color:#fff; border-color:var(--accent); }
.code-copy.copied { background:var(--green); color:#fff; border-color:var(--green); }
.code-block pre { margin:0; padding:0; }
.code-block pre code { padding:18px 20px !important; font-family:'JetBrains Mono',monospace !important; font-size:.82rem !important; line-height:1.65 !important; display:block; overflow-x:auto; }

/* Steps */
.steps { list-style:none; padding:0; }
.steps li {
  display:flex; gap:14px; padding:14px 0; border-bottom:1px solid var(--border);
}
.steps li:last-child { border-bottom:none; }
.step-num {
  width:28px; height:28px; border-radius:50%; flex-shrink:0;
  background:linear-gradient(135deg,#3B82F6,#6366F1);
  display:flex; align-items:center; justify-content:center;
  font-size:.75rem; font-weight:700; margin-top:2px;
}
.step-content .step-title { font-size:.88rem; font-weight:600; margin-bottom:4px; }
.step-content .step-desc  { font-size:.82rem; color:var(--text-2); line-height:1.6; }

/* Comparison */
.compare-grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
.compare-card { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius); padding:16px; }
.compare-card .cc-head { font-size:.85rem; font-weight:700; margin-bottom:12px; display:flex; align-items:center; gap:8px; }
.compare-card .cc-head.bad  { color:var(--red); }
.compare-card .cc-head.good { color:var(--green); }
.compare-card ul { list-style:none; }
.compare-card li { font-size:.8rem; color:var(--text-2); padding:5px 0; border-bottom:1px solid var(--border); display:flex; align-items:flex-start; gap:8px; }
.compare-card li:last-child { border-bottom:none; }

/* Project card */
.project-card {
  background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius);
  overflow:hidden; margin-bottom:20px;
}
.project-card-header {
  padding:20px 24px;
  background:linear-gradient(135deg, var(--bg-deep), var(--bg-hover));
  border-bottom:1px solid var(--border);
  display:flex; align-items:center; gap:16px;
}
.project-card-icon { font-size:2.2rem; }
.project-card-meta h3 { font-size:1.2rem; font-weight:700; margin-bottom:4px; }
.project-card-meta p { font-size:.82rem; color:var(--text-2); }
.project-badge { margin-left:auto; padding:5px 12px; border-radius:20px; font-size:.72rem; font-weight:600; background:var(--accent-glow); color:var(--accent-2); border:1px solid var(--accent)40; }
.project-card-body { padding:20px 24px; }
.arch-flow { display:flex; align-items:center; gap:8px; flex-wrap:wrap; margin:16px 0; }
.arch-node { background:var(--bg-deep); border:1px solid var(--border-2); border-radius:var(--radius-sm); padding:8px 14px; font-size:.78rem; font-weight:600; text-align:center; }
.arch-node.highlight { border-color:var(--accent); color:var(--accent-2); }
.arch-arrow { color:var(--text-3); font-size:1.1rem; }

/* Infra step */
.infra-step {
  background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius);
  padding:18px 20px; margin-bottom:14px;
}
.infra-step-header { display:flex; align-items:center; gap:10px; margin-bottom:12px; }
.infra-step-num { background:linear-gradient(135deg,var(--accent),var(--purple)); width:26px; height:26px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:.75rem; font-weight:700; flex-shrink:0; }
.infra-step-title { font-size:.9rem; font-weight:600; }
.infra-step-desc { font-size:.82rem; color:var(--text-2); line-height:1.6; margin-bottom:12px; }

/* Progress bar */
.progress-bar-wrap { margin-top:20px; }
.progress-bar-label { font-size:.78rem; color:var(--text-3); margin-bottom:6px; display:flex; justify-content:space-between; }
.progress-bar-track { height:6px; background:var(--border); border-radius:3px; overflow:hidden; }
.progress-bar-fill  { height:100%; background:linear-gradient(90deg,var(--accent),var(--teal)); border-radius:3px; transition:width .6s ease; }

/* Responsive tweaks */
@media(max-width:768px) {
  :root { --sidebar-w:260px; }
  .compare-grid { grid-template-columns:1fr; }
}

/* Animations */
@keyframes fadeIn { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
.fade-in { animation:fadeIn .3s ease forwards; }

/* Scrollbar for code */
pre::-webkit-scrollbar { height:6px; }
pre::-webkit-scrollbar-track { background:#0D1117; }
pre::-webkit-scrollbar-thumb { background:#2A3F5F; border-radius:3px; }

.pill { display:inline-block; padding:2px 8px; border-radius:20px; font-size:.7rem; font-weight:600; }
.pill-blue { background:#3B82F620; color:#60A5FA; }
.pill-green { background:#22C55E20; color:#4ADE80; }
.pill-orange { background:#F9731620; color:#FB923C; }
.pill-purple { background:#A855F720; color:#C084FC; }
.pill-red { background:#EF444420; color:#F87171; }

.dlq-answer pre code { background: none; color: inherit; padding: 0; font-size: .8rem; }
.dlq-answer table { width:100%; border-collapse:collapse; font-size:.8rem; margin:12px 0; border-radius:8px; overflow:hidden; border:1px solid var(--border); }
.dlq-answer th { background:var(--bg-deep); color:var(--accent-2); padding:9px 14px; text-align:left; font-weight:600; border-bottom:1px solid var(--border-2); }

.dlq-loading { padding: 32px; text-align: center; color: var(--text-3); font-size: .88rem; display:flex; align-items:center; justify-content:center; gap:10px; }
.dlq-spinner { width:18px; height:18px; border:2px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin .7s linear infinite; }

.dlq-not-available { padding:20px 18px; text-align:center; color:var(--text-3); font-size:.82rem; font-style:italic; }

import org.apache.spark.streaming.kafka010._

val ssc = new StreamingContext(sc, Seconds(5))

val stream = KafkaUtils.createDirectStream[String, String](
  ssc, LocationStrategies.PreferConsistent,
  ConsumerStrategies.Subscribe[String, String](Set("weblogs"), kafkaParams)
)

// Parse log lines: IP method URL status bytes userAgent
val logPattern = """(\\S+) \\S+ \\S+ \\[.*\\] "(\\S+) (\\S+).*" (\\d+) (\\d+)""".r

val parsed = stream.map(_.value()).flatMap { line =>
  logPattern.findFirstMatchIn(line).map(m =>
    (m.group(1), m.group(2), m.group(3), m.group(4).toInt, m.group(5).toInt)
  )
}

// Compute metrics every 5 seconds
parsed.foreachRDD { rdd =>
  if (!rdd.isEmpty()) {
    val total   = rdd.count()
    val errors  = rdd.filter(_._4 >= 400).count()
    val bytes   = rdd.map(_._5.toLong).sum()
    val topUrls = rdd.map(r => (r._3, 1)).reduceByKey(_ + _)
                     .sortBy(-_._2).take(10)

    val json = s"""{"timestamp":"\${now}","rps":\${total/5.0},"errors":\${errors},"bytes":\${bytes},"topUrls":\${topUrls.toJson}}"""

    // Publish to Kafka "stats" topic
    kafkaProducer.send(new ProducerRecord("stats", json))
  }
}

ssc.start()
ssc.awaitTermination()`},

w = Window.partitionBy("user_id").orderBy("event_time")

    .withColumn("time_diff",

    .withColumn("new_session", 
        when(col("time_diff") > 1800, 1).when(col("prev_time").isNull(), 1).otherwise(0)) \\
    .withColumn("session_id", 
        concat(col("user_id"), lit("_"), 
               sum("new_session").over(w.rowsBetween(Window.unboundedPreceding, 0))))

    .agg(*[max(when(col("page") == step, 1).otherwise(0)).alias(step) 
           for step in funnel_steps])

total_sessions = funnel.count()
for step in funnel_steps:

from pyspark.sql.functions import *
from pyspark.sql.types import *

# Apache Combined Log Format parser
LOG_PATTERN = r'(\\S+) \\S+ (\\S+) \\[([^\\]]+)\\] "(\\S+) (\\S+)[^"]*" (\\d+) (\\d+|-)'

def parse_log(line):
    m = re.match(LOG_PATTERN, line)
    if m:
        return (m.group(1), m.group(2), m.group(3),
                m.group(4), m.group(5), int(m.group(6)),
                int(m.group(7)) if m.group(7) != '-' else 0)
    return None

parse_udf = udf(parse_log, StructType([
    StructField("ip", StringType()),
    StructField("user", StringType()),
    StructField("timestamp", StringType()),
    StructField("method", StringType()),
    StructField("url", StringType()),
    StructField("status", IntegerType()),
    StructField("bytes", IntegerType()),
]))

# Stream logs from Kafka
raw = spark.readStream \\
    .format("kafka") \\
    .option("kafka.bootstrap.servers","kafka:9092") \\
    .option("subscribe","app-logs") \\
    .load()

logs = raw.select(parse_udf(col("value").cast("string")).alias("p")) \\
    .select("p.*") \\
    .withColumn("event_time", to_timestamp(col("timestamp"),"dd/MMM/yyyy:HH:mm:ss Z")) \\
    .withColumn("is_error", when(col("status") >= 500, 1).otherwise(0))

# 1-minute error rate (anomaly detection threshold: > 5% errors)
error_rates = logs \\
    .withWatermark("event_time","5 minutes") \\
    .groupBy(window("event_time","1 minute")) \\
    .agg(
        count("*").alias("total_requests"),
        sum("is_error").alias("error_count"),
        (sum("is_error")/count("*")*100).alias("error_rate_pct"),
        avg("bytes").alias("avg_response_bytes"),
        countDistinct("ip").alias("unique_ips")
    ) \\
    .filter(col("total_requests") > 10)  # Ignore low-traffic windows`},

from prophet import Prophet  # Facebook Prophet
from pyspark.sql.types import *

# M5 Forecasting Dataset â€” 30,000 item-store combinations!
sales = spark.read.csv("m5-forecasting-accuracy/sales_train_evaluation.csv", 
                        header=True, inferSchema=True)

# Melt wide format to long format
id_vars = ["id","item_id","dept_id","cat_id","store_id","state_id"]
value_vars = [f"d_{i}" for i in range(1, 1942)]

sales_long = sales.selectExpr(
    *id_vars,
    *[f"stack({len(value_vars)}, " + 
      ", ".join([f"'{d}', {d}" for d in value_vars]) + 
      ") as (day, sales)" ]
)

# Add calendar (day â†’ actual date)
calendar = spark.read.csv("calendar.csv", header=True, inferSchema=True)
df = sales_long.join(calendar.select("d","date"), on="d")

# Pandas UDF: train one Prophet model per item-store
forecast_schema = StructType([
    StructField("item_store_id", StringType()),
    StructField("ds", DateType()),
    StructField("yhat", DoubleType()),
    StructField("yhat_lower", DoubleType()),
    StructField("yhat_upper", DoubleType()),
])

@pandas_udf(forecast_schema, PandasUDFType.GROUPED_MAP)
def forecast_item(pdf):
    uid = pdf["item_store_id"].iloc[0]
    # Train Prophet model on this specific item-store combo
    m = Prophet(yearly_seasonality=True, weekly_seasonality=True, 
                daily_seasonality=False, uncertainty_samples=50)
    train = pdf[["date","sales"]].rename(columns={"date":"ds","sales":"y"})
    m.fit(train)
    future = m.make_future_dataframe(periods=28)
    forecast = m.predict(future).tail(28)
    forecast["item_store_id"] = uid
    return forecast[["item_store_id","ds","yhat","yhat_lower","yhat_upper"]]

# Run in parallel across all 30,000 item-store combos
forecasts = df.groupby("item_store_id").apply(forecast_item)
forecasts.write.parquet("output/demand-forecasts/")
print("Trained 30,000 models in parallel using Spark + Pandas UDFs")`},

function showTopic(partId, chId, topicId) {
  const part    = CURRICULUM.find(p=>p.id===partId);
  const chapter = part?.chapters.find(c=>c.id===chId);
  const topic   = chapter?.topics.find(t=>t.id===topicId);
  if (!topic) return;

  setActiveTopicEl(document.getElementById('topic-'+topicId));
  // Auto-open tree
  const pc = document.getElementById('children-'+partId);
  const cc = document.getElementById('children-'+chId);
  if (pc && !pc.classList.contains('open')) togglePart(partId);
  if (cc && !cc.classList.contains('open')) toggleChapter(chId);

  let html = `
    <div class="topic-header">
      <div class="topic-breadcrumb">
        <span>${part.icon} ${part.title}</span>
        <span class="bc-sep">â€º</span>
        <span>${chapter.title}</span>
        <span class="bc-sep">â€º</span>
        <span class="bc-current">${topic.title}</span>
      </div>
      <h1 class="topic-title"><span class="title-accent">${topic.title}</span></h1>
      <p class="topic-tagline">${topic.overview || ''}</p>
      <div class="topic-tags">
        ${tagBadge(topic.tag)}
        <span class="tag tag-part">${topic.chapter}</span>
      </div>
    </div>
    <div class="section-divider"></div>
  `;

  if (topic.concepts?.length) {
    html += `<div class="section">
      <div class="section-title"><span class="s-icon">ðŸ’¡</span> Key Concepts</div>
      <div class="concepts-grid">
        ${topic.concepts.map(c=>`
          <div class="concept-card">
            <div class="cc-icon">${c.icon}</div>
            <div class="cc-title">${c.title}</div>
            <div class="cc-desc">${c.desc}</div>
          </div>`).join('')}
      </div>
    </div>`;
  }

  if (topic.tableHeaders) {
    html += `<div class="section">
      <div class="section-title"><span class="s-icon">ðŸ“Š</span> Comparison Table</div>
      <div class="data-table-wrap"><table class="data-table">
        <thead><tr>${topic.tableHeaders.map(h=>`<th>${h}</th>`).join('')}</tr></thead>
        <tbody>${topic.tableRows.map(row=>`<tr>${row.map((c,i)=>`<td${i===0?` class="mono"`:``}>${escHtml(c)}</td>`).join('')}</tr>`).join('')}</tbody>
      </table></div>
    </div>`;
  }

  if (topic.code) {
    html += `<div class="section">
      <div class="section-title"><span class="s-icon">ðŸ’»</span> Code Example</div>
      ${codeBlock(topic.code)}
    </div>`;
  }
  if (topic.code2) {
    html += `<div class="section">
      <div class="section-title"><span class="s-icon">ðŸ’»</span> Alternative Code Example</div>
      ${codeBlock(topic.code2)}
    </div>`;
  }


  html += `<div class="info-box tip">
    <strong>ðŸ’¡ Pro Tip:</strong> Open your spark-shell or PySpark REPL and run these examples as you study each concept. Active coding cements understanding far faster than reading alone.
  </div>`;

  // Inject DLQ placeholder â€” will be populated by fetchDLQ async
  html += `<div id="dlq-container" class="dlq-section">
    <div class="dlq-loading"><div class="dlq-spinner"></div> Loading Deep Learning Questions...</div>
  </div>`;

  render(html);

  // Async fetch Deep Learning Questions from enriched MD file
  fetchDLQ(partId, chapterId, topicId);
}

const DLQ_QUESTIONS = [
  {num:'Q1', label:'Why Introduced?',       tag:'why'},
  {num:'Q2', label:'How Does It Work?',     tag:'what'},
  {num:'Q3', label:'Where To Use?',         tag:'where'},
  {num:'Q4', label:'Where NOT To Use?',     tag:'anti'},
  {num:'Q5', label:'Spark vs Hadoop',       tag:'hadoop'},
  {num:'Q6', label:'RDBMS Analogy',         tag:'sql'},
  {num:'Q7', label:'Behind The Scenes',     tag:'bg'},
  {num:'Q8', label:'Performance & Best Practices', tag:'perf'},
  {num:'Q9', label:'Interview Questions',   tag:'intv'},
  {num:'Q10',label:'Real-World Example',    tag:'rwe'},
];
async function fetchDLQ(partId, chapterId, topicId) {
  const container = document.getElementById('dlq-container');
  if (!container) return;

  try {
    if (typeof DLQ_DATA === 'undefined') {
      container.innerHTML = '<div class="dlq-not-available">ERROR: dlq_data.js did not load. Please hard refresh (Ctrl+Shift+R).</div>';
      return;
    }

    const data = DLQ_DATA[topicId];
    if (!data || !data.questions || data.questions.length === 0) {
      container.innerHTML = '<div class="dlq-not-available">Deep Learning Questions coming soon for this topic.</div>';
      return;
    }

    const qBlocks = data.questions;

    let aHtml = '<div class="dlq-header"><div class="dlq-header-icon">\uD83C\uDF93</div><div class="dlq-header-text"><h3>Deep Learning Questions</h3><p>10 expert-level questions covering beginner to architect to interview perspectives</p></div><div class="dlq-badge">' + qBlocks.length + ' QUESTIONS</div></div><div class="dlq-accordion">';

    DLQ_QUESTIONS.forEach(function(def, i) {
      const blk = qBlocks[i] || null;
      const bodyText = blk ? blk.body : 'Content coming soon.';
      const bodyHtml = (typeof marked !== 'undefined') ? marked.parse(bodyText) : '<p>' + escHtml(bodyText) + '</p>';
      aHtml += '<div class="dlq-item" id="dlq-item-' + i + '">';
      aHtml += '<div class="dlq-question" onclick="toggleDLQ(' + i + ')">';
      aHtml += '<div class="dlq-q-num">' + def.num + '</div>';
      aHtml += '<div class="dlq-q-text">' + def.label + '</div>';
      aHtml += '<span class="dlq-q-tag ' + def.tag + '">' + def.tag.toUpperCase() + '</span>';
      aHtml += '<span class="dlq-chevron">&#9654;</span>';
      aHtml += '</div>';
      aHtml += '<div class="dlq-answer">' + bodyHtml + '</div>';
      aHtml += '</div>';
    });

    if (data.takeaways) {
      const metaHtml = (typeof marked !== 'undefined') ? marked.parse(data.takeaways) : '<p>' + escHtml(data.takeaways) + '</p>';
      aHtml += '<div class="dlq-item" id="dlq-item-meta">';
      aHtml += '<div class="dlq-question" onclick="toggleDLQMeta()">';
      aHtml += '<div class="dlq-q-num" style="background:linear-gradient(135deg,#F59E0B,#EF4444)">&#128204;</div>';
      aHtml += '<div class="dlq-q-text">Key Takeaways, Misconceptions &amp; References</div>';
      aHtml += '<span class="dlq-q-tag rwe">SUMMARY</span>';
      aHtml += '<span class="dlq-chevron">&#9654;</span>';
      aHtml += '</div>';
      aHtml += '<div class="dlq-answer">' + metaHtml + '</div>';
      aHtml += '</div>';
    }

    aHtml += '</div></div>';
    container.innerHTML = aHtml;

    if (window.hljs) {
      container.querySelectorAll('pre code').forEach(function(el) { hljs.highlightElement(el); });
    }
  } catch(e) {
    container.innerHTML = '<div class="dlq-not-available">Error loading questions: ' + e.message + '. Please hard refresh (Ctrl+Shift+R).</div>';
  }
}


function toggleDLQ(idx) {
  const item = document.getElementById('dlq-item-' + idx);
  if (!item) return;
  item.classList.toggle('open');
}
function toggleDLQMeta() {
  const item = document.getElementById('dlq-item-meta');
  if (!item) return;
  item.classList.toggle('open');
}

// â”€â”€â”€ Search â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
function searchTopics(q) {
  if (!q || q.length < 2) return;
  q = q.toLowerCase();
  const results = [];
  CURRICULUM.forEach(part => {
    part.chapters.forEach(ch => {
      ch.topics.forEach(t => {
        if (t.title.toLowerCase().includes(q) || (t.overview||'').toLowerCase().includes(q)) {
          results.push({type:'topic', part, ch, t});
        }
      });
    });
  });
  PROJECTS.forEach(p => {
    if (p.title.toLowerCase().includes(q) || p.desc.toLowerCase().includes(q)) {
      results.push({type:'project', p});
    }
  });
  if (results.length === 0) return;
  if (results.length === 1) {
    const r = results[0];
    if (r.type==='topic') showTopic(r.part.id, r.ch.id, r.t.id);
    else showProject(r.p.id);
    return;
  }
  // Show search results
  let html = `
    <h2 style="margin-bottom:20px;">Search Results for "<span style="color:var(--accent-2)">${escHtml(q)}</span>"</h2>
    <div style="display:grid;gap:12px;">
  `;
  results.forEach(r => {
    if (r.type==='topic') {
      html += `<div class="concept-card" style="cursor:pointer" onclick="showTopic('${r.part.id}','${r.ch.id}','${r.t.id}')">
        <div style="font-size:.75rem;color:var(--text-3);margin-bottom:6px;">${r.part.title} â€º ${r.ch.title}</div>
        <div class="cc-title">${r.t.title}</div>
        <div class="cc-desc">${(r.t.overview||'').substring(0,120)}...</div>
      </div>`;
    } else {
      html += `<div class="concept-card" style="cursor:pointer" onclick="showProject('${r.p.id}')">
        <div style="font-size:.75rem;color:var(--text-3);margin-bottom:6px;">Real-World Project ${r.p.num}</div>
        <div class="cc-title">${r.p.icon} ${r.p.title}</div>
        <div class="cc-desc">${r.p.desc.substring(0,120)}...</div>
      </div>`;
    }
  });
  html += '</div>';
  render(html);
}
</script>
