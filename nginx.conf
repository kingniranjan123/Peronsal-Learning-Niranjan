server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index spark_study_portal.html index.html;

    # Serve .md files as plain text so fetch() can read them
    location ~* \.md$ {
        add_header Content-Type "text/plain; charset=utf-8";
        add_header Access-Control-Allow-Origin "*";
        add_header Cache-Control "public, max-age=3600";
    }

    # Main app
    location / {
        try_files $uri $uri/ /spark_study_portal.html;
        add_header Cache-Control "no-cache";
    }

    # dlq_data.js must never be cached
    location = /dlq_data.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
    }

    # Static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_types text/plain text/html text/css application/javascript application/json;
}
